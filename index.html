<div class="press-interview-block">
<p class="question">1. What does it mean for you to “throw a headbutt” at the party?</p>
<p class="question">Your name evokes collision, a frontal impact. What is the origin of the name? Is your way of partying a form of resistance? If so, resistance against what or whom?</p>
<p class="answer">HEADBUTT is a way of thinking. Everyone should be HEADBUTT – everyone should be able to throw their own headbutt wherever they feel the need to express themselves. That frontal impact starts as an impulse, something you do without thinking, out of necessity. HEADBUTT is also a rhythm: you dance following the movement of your head.</p>
<p class="answer">For us, it comes from the desire to see events that feel less sanitized, with more color – in every sense of the word. We started our parties because, honestly, we were bored. It was always the same profiles and the same visuals. We’re here to headbutt the world of electronic music. We wanted to create a space that felt less monochrome, and above all to bring together the different worlds that inspire us.</p>
<p class="answer">The resistance in our approach lies in doing things the way we truly want to. It’s about refusing standardization, refusing the pressure to conform. Doing things with genuine intention is already a form of resistance.</p>
<p class="answer">It also means resisting what has been imposed on us – creating a space where, as mixed-race young women, we had long been made to feel we didn’t belong. Organizing these parties is our way of inhabiting this scene on our own terms, even though we hadn’t been part of it for years beforehand. We arrived somewhat out of nowhere, without really knowing much about organizing or producing events.</p>
<p class="answer">We also refuse to rely on vague terms like “minority” or “racialized.” That kind of marketing designed to soothe consciences irritates us deeply. We prefer to express ourselves through striking images, powerful messages that go straight to the point, and through the real values we carry in our hearts. In our view, that kind of communication has far more weight and impact than words that eventually become empty – used merely to tick boxes without truly reaching people.</p>
<p class="answer">Resistance also means acknowledging the Black contributions to electronic music. Too often techno, house, funk, and disco are “whitened” in the collective imagination, even though they were born out of the struggles and innovations of the Black community.</p>
<p class="answer">Techno – influenced by the electronic music of Kraftwerk – emerged in Detroit through pioneers such as Juan Atkins, Derrick May, and Kevin Saunderson, in response to the social realities of African-American communities. House music, carried by artists like Frankie Knuckles in Chicago, and disco, shaped by Black and queer icons such as Donna Summer and Sylvester, were spaces of freedom and self-expression.</p>
<p class="answer">Saying “Techno is BLACK” means refusing this erasure, reclaiming that history, and demanding that the heirs of these movements find their rightful place in the music industry.</p>
<p class="answer">Exactly – it’s about giving artists a voice by offering them a real space for expression. Leaving room for the spontaneity of bodies, putting dancers at the forefront rather than DJs.</p>
<p class="answer">We’re not interested in constantly defining which category we belong to. We want the body to take center stage, and the music to be the only statement. Everything we do, we do with heart, and with the support of the people around us.</p>
<p class="answer">HEADBUTT is the cross-pollination of our experiences, our visions, and everything we want to see in the electronic music scene.</p>
</div>
<div class="press-interview-block">
<p class="question">2. What was your first real shock on a dancefloor?</p>
<p class="question">A particular set? The moment that made you want to create your own spaces. What was missing? What did you want to see, feel, and experience?</p>
<p class="answer">My first memories go back to the warehouses I discovered when I was living in London. Those moments were powerful – music became the only space that mattered, merging with the movements of dance. What brought us together was a shared love for a music we deeply valued.</p>
<p class="answer">That’s what techno does: it has this ability to make gestures feel obvious and primitive. Repetitive rhythms open up a trance, and when the body dances and speaks, it always hits like a shock.</p>
<p class="answer">What was always missing for me in the techno parties I attended was a crowd that looked like me. I always felt like the mixed-race girl among only a handful of non-white people in the room. I never understood why things were this way, considering that most of the rhythms originate from Black culture.</p>
<p class="answer">When I met Vanille, for the first time I allowed myself to believe that we could create new spaces within the French electronic scene.</p>
<p class="answer">Dance itself was also undervalued. Why shouldn’t this driving music be guided and energized by professional dancers? For us, that became one of the first necessities – the thing that pushed us to organize HEADBUTT.</p>
<p class="answer">We wanted to place those performer-artists we admire on our line-ups, dancing at the same time as DJs like MCRT were playing. Our events had to become a spectacle.</p>
<p class="answer">My first real shock in electronic music came from discovering free parties, underground raves, and illegal gatherings. What struck me was the total freedom: no dress code, no imposed entrance conditions, no constraints. Just the music at the center of everything.</p>
<p class="answer">The raw energy of the sound – that heavy kick that hits you directly – for me, that completely embodies Headbutt. Headbutt is not about a specific musical style, it’s about intensity and impact.</p>
<p class="answer">But there were things missing.</p>
<p class="answer">First, representation: too few women, too few Black or queer people on the scene. It was difficult to identify with anyone.</p>
<p class="answer">Second, musical eclecticism: at the time the parties felt very compartmentalized – minimal, tech house, house… There was little fusion between genres. Today that’s changing, and we see ourselves as children of this artistic cross-pollination.</p>
<p class="answer">Finally, there was a lack of playfulness and fun. With Marie, we felt some parties were too dark, too static, everyone staying in their own corner. We wanted a space where people could have fun and experiment.</p>
<p class="answer">Performance and visual art also felt underused. We wanted inspiring visuals that elevate the experience – not just psychedelic images meant to make people “trip.”</p>
<p class="answer">We try to create a captivating experience where music, dance, and art respond to each other. On stage, dancers amplify the energy of the dancefloor, create connection, and carry the audience with them.</p>
<p class="answer">In those altered states – created by music and atmosphere – perceptions shift and emotions intensify.</p>
<p class="answer">I think the night is still one of the few places where people can connect with each other selflessly. Spaces dedicated to play gradually disappear as we grow older, even though play was once our only purpose as children.</p>
<p class="answer">We should keep playing. Dance is an infinite game.</p>
<p class="answer">I want grown adults to come and play at our parties. I would love for the night to regain its vibrant energy, without being associated with excessive consumption that makes you regret going out.</p>
<p class="answer">Headbutt is that space where everything is experienced more intensely.</p>
</div>
<div class="press-interview-block">
<p class="question">3. Who has the right to party in Paris today?</p>
<p class="question">Between police repression, the gentrification of alternative venues, and overly marketed “safe” formats – where do you position yourselves within this changing landscape?</p>
<p class="answer">There are many types of parties. My favorites are the ones I have with friends in a living room, with the music we choose ourselves.</p>
<p class="answer">As for venues that host parties, the first barrier is cost. Not everyone can spend fifteen euros to go dancing and then take an Uber home whenever they want. A first separation already happens there.</p>
<p class="answer">At the same time, partying has lost some of its essence because of the starification of DJs. Artist fees have reached extraordinary levels, pushing festivals and major events to spend hundreds of thousands of euros on a single headliner.</p>
<p class="answer">As a result, ticket prices explode. Some festivals cost hundreds of euros, and after that people simply can’t afford to go out clubbing anymore.</p>
<p class="answer">Today I feel that partying in Paris is becoming increasingly inaccessible, especially in the techno scene. It’s dominated by a white, wealthy elite, with a new crowd influenced by Berlin – adopting precise dress codes and standardized attitudes.</p>
<p class="answer">There’s an unspoken rule: to be accepted in certain places, you have to match a specific image.</p>
<p class="answer">Even worse, many people come without even knowing the music – simply because they saw viral videos on TikTok.</p>
<p class="answer">That’s exactly what we want to push against with Headbutt.</p>
<p class="answer">Instead of relying on a single bankable name, we prefer to highlight local talent and emerging international artists. The goal is to create accessible events where a community can gather and grow.</p>
<p class="answer">Sometimes I feel like partying itself is under attack – as if people sense that it allows humans to reconnect with themselves.</p>
<p class="answer">When I see new laws proposed to penalize the organization of raves, I genuinely wonder: what are they so afraid of?</p>
<p class="answer">Why are these measures implemented so quickly, while there are so many other places that would actually require real resources to keep us safe?</p>
<p class="answer">Personally, I sometimes feel less safe in certain taxis than at parties.</p>
<p class="answer">We cannot change an entire system – whether it’s capitalist thinking or the way social issues are approached. We have never claimed to establish a framework that society itself cannot guarantee.</p>
<p class="answer">All we can do as organizers is ensure that our teams remain aware and attentive during our events.</p>
<p class="answer">A certain marketing of nightlife has clearly taken hold, whereas in our view education and awareness about risks should be the priority.</p>
</div>
<div class="press-interview-block">
<p class="question">4. What remains subversive in the way we dance, gather, and sweat together?</p>
<p class="answer">What is subversive is precisely this reappropriation of the body outside the usual frameworks of productivity and control.</p>
<p class="answer">Dance – especially in a festive context – creates a space where the rules of society are temporarily suspended: hierarchy, individualism, communication filtered through screens.</p>
<p class="answer">It goes against the dominant model that wants us isolated, absorbed by work and digital communication that makes us predictable and controllable.</p>
<p class="answer">When we dance, we are not consuming a product – we are experiencing collective energy. Bodies return to a form of pure presence.</p>
<p class="answer">When we dance and gather to sweat together, we express the full power carried by the body.</p>
<p class="answer">Sensation and emotion are the languages we speak.</p>
<p class="answer">Bodies do not know how to lie. They reveal an intimacy that has become increasingly rare to hear.</p>
<p class="answer">We must keep expressing that together.</p>
<p class="answer">The fact that partying is a space of equality and social mixing – where body language overtakes verbal language – makes it difficult for a system that wants to categorize everything.</p>
<p class="answer">These moments disturb the system because they remind us that we can exist outside suffering or economic servitude.</p>
</div>
<div class="press-interview-block">
<p class="question">5. Who are you without the party?</p>
<p class="question">That’s a real question. Can you still define yourselves outside of it when it has become such a vital organ of your pulse?</p>
<p class="answer">For me, partying occupies the same place as play. The party can be everywhere with me – it simply needs to find the forms in which it can activate itself. It’s about asking how to stimulate the mind, what kind of momentum can make us feel that what we do carries a vital pulse.</p>
<p class="answer">Listening to and observing others with real attention is already a great celebration – something powerful that animates me.</p>
<p class="answer">My creativity unfolds through various fields such as fashion, performance, and spatial design. I have always cultivated a collaborative approach to art, often creating alongside my brothers who share my love for innovation and teamwork.</p>
<p class="answer">My artistic approach is also shaped by my admiration for theater. I dream of creating works structured around playful scenography – reminiscent of playgrounds – addressing universal themes such as the search for meaning and the dynamics of the body.</p>
<p class="answer">Before stepping into this new playground that music offers, I worked much more in the world of fashion.</p>
<p class="answer">Today much of our work revolves around the video format we began producing last year to continue telling our stories.</p>
<p class="answer">We launched our YouTube channel and created a space where artists can express themselves freely under our artistic direction. Through the THINK HEADBUTT format, we want to encourage people to do things differently.</p>
<p class="answer">Parties were our first form of expression, but there are still many worlds we want to explore.</p>
<p class="answer">Beyond that, my life is devoted to giving space to my inner child and sharing peaceful moments with the people I love.</p>
<p class="answer">Without the party, we are artists in search – creators and thinkers.</p>
<p class="answer">As a DJ, my role in nightlife has sometimes been a source of questioning. I accompany moments of excess and loss of control, and at times I have felt a certain guilt about being at the center of that dynamic.</p>
<p class="answer">But over time I understood that the party is also an essential space of liberation – a moment when music creates pure emotion, brings joy, and unites people in a unique collective energy.</p>
<p class="answer">Paradoxically, outside my work I move further and further away from that world. I rarely go out anymore, and sometimes I find it difficult to listen to music simply for pleasure, because it already fills my daily professional life.</p>
<p class="answer">Before becoming a DJ, I studied art and fashion and worked for several years for an electronic music streaming platform in London, where we worked extensively with artificial intelligence.</p>
<p class="answer">That experience deepened my reflections on the importance of the human mind in creation – sensitivity and emotion.</p>
<p class="answer">Ultimately, beyond the party, I remain an explorer – someone who thinks, plays with ideas, and tries to understand the world through art and music.</p>
</div>
<div class="press-interview-block">
<p class="question">6. What do you do with violence in nightlife?</p>
<p class="question">Not only the violence we experience, but also the violence we sometimes generate ourselves. How do you transform it? Accept it? Deconstruct it?</p>
<p class="answer">From our very first party we chose the slogan “Please don’t come,” because we are fully aware of the violence that exists around us. It was a kind of anticipatory reaction – a way of saying that we didn’t want to become a meeting point for conflict without having to explain it too explicitly.</p>
<p class="answer">Our slogan is brutal, but our parties remain playful.</p>
<p class="answer">We live in a violent world, and within that violence there is, somewhere, the same power for empathy. Understanding that violence is the result of multiple factors might allow us to think differently about how we respond to it.</p>
<p class="answer">I see violence as a restless spirit reacting to things that confine us.</p>
<p class="answer">To deconstruct it, we need to observe what limits us. Perhaps that’s how we can transform it.</p>
<p class="answer">Violence often comes from repressed or unresolved emotions. It also comes from a lack of education.</p>
<p class="answer">What we try to do is redirect it through thought. That’s also why we created our YouTube video format THINK HEADBUTT, which in the long term aims to foster a more conscious society and encourage new ways of thinking.</p>
</div>
<div class="press-interview-block">
<p class="question">7. What place do silence, boredom, and slowing down have in your festive practices?</p>
<p class="answer">This question should be central in nightlife today. We think about it constantly, as if we hold in our hands a key space where everyday habits could shift.</p>
<p class="answer">There is less and less space for boredom, yet we want to invite our audience to reconnect with that state of deceleration just as much as with the impulse of euphoria.</p>
<p class="answer">We have never structured our line-ups around the usual crescendo where the closing DJ must deliver the most intense set. On the contrary, we want the audience to find a way to end the party – something that often becomes difficult once daylight arrives.</p>
<p class="answer">This is something we haven’t yet implemented but will introduce soon: ending our events with ambient live performances and soothing music.</p>
<p class="answer">The idea is to allow our community to come down collectively from the euphoria in a calm and peaceful way – marking a true end to the party.</p>
<p class="answer">At HEADBUTT events you also hear a jingle between each set. It’s a way to create a break and allow each artist to take over the audience on their own terms, without having to follow the mood created before them.</p>
<p class="answer">The dancers at our events also create moments of contemplation – pauses within the movement of the body. Introducing performances during the night is a concrete way to open space for silence.</p>
<p class="answer">Personally I struggle with boredom and silence – I always need stimulation – so it’s also something I reflect on in my own life.</p>
<p class="answer">Yesterday my therapist told me this quote: “Silence is a deep melody, for those who can hear it above the noise.”</p>

<div class="press-interview-block">
<p class="question">8. If your party had a soundtrack, what would it be?</p>
<p class="question">A few essential or unexpected tracks – the ones that express your language, your frequencies.</p>
<p class="answer">Headbutt is more than a party – it’s a sonic universe we carefully shape. By also taking on the role of a label, we want to affirm a musical identity that is borderless, raw, and impactful.</p>
<p class="answer">Cocktail – DJ Ali<br>Struggle – Robert Hood<br>Go Get Busy – DJ Sim<br>I’ve Been Waiting – MCRT<br>BXTR – Synthetica<br>Vanille – Goat Skin<br>Sicion – Abyssal<br>Tzusing – 日出東方 唯我不敗<br>Behzad et Bouh – Bebou-Éclosion<br>Muslimgauze – Every Grain Of Palestinian Sand</p>
</div>
<div class="press-interview-block">
<p class="question">9. What would you like to pass on to emerging collectives today?</p>
<p class="question">And what would you like people to forget – once and for all?</p>
<p class="answer">What we want to pass on to future generations and emerging collectives is, above all, audacity.</p>
<p class="answer">The courage to dare, to create your own space when none exists. If no one opens the door for you, then build it yourself.</p>
<p class="answer">Create your own story. Tell people who you are. Don’t look sideways or try to respond to what others expect.</p>
<p class="answer">If you feel the need to create something, there are certainly other people somewhere who need it too. Even if initiating a new world means speaking from your singularity.</p>
<p class="answer">But beyond the act of creation, we also want to share a certain way of partying – a conscious way, grounded in emotion and reality.</p>
<p class="answer">A new generation is arriving and will take over, but perhaps it does not yet have the tools to celebrate differently: without escape, without virtuality, without getting lost in the illusion of “always more.”</p>
<p class="answer">Most importantly, we want them to understand that they don’t need to be everywhere, to be visible, or to go viral.</p>
<p class="answer">The value of an experience cannot be measured in content.</p>
<p class="answer">It is possible to exist differently, to carve your own path, and to refuse to follow tracks that have already been drawn.</p>
<p class="answer">What matters most is transmitting your message. Don’t do things just for the sake of doing them.</p>
<p class="answer">Personally, I wish we could forget phones at parties. They have nothing to do there.</p>
<p class="answer">Bodies cannot connect when everyone is simultaneously trying to document the moment.</p>
<p class="answer">Nothing can truly happen if everyone wants to act as the visual witness of the event.</p>
<p class="answer">Machines carry forces we underestimate. We let them live our experiences for us, and we understand less and less what the mystery of experience really is.</p>
<p class="answer">We stand against a certain ridiculous culture of virality that has settled into this scene.</p>
<p class="answer">This culture of emptiness is spreading across many disciplines, and we want to eradicate it.</p>
</div>
<div class="press-interview-block">
<p class="question">10. The Headbutt manifesto</p>
<p class="question">It can also be a slogan (maximum five sentences).</p>
<p class="answer">Our slogan already exists. It is both a banner and a filter.</p>
<p class="answer">It embodies our vision, our desire for change, our search for unity.</p>
<p class="answer">But it is also a natural repellent for those who do not share that desire, who do not recognize themselves in what we are building.</p>
<p class="answer">There is no obligation to join, no compromise to make.</p>
<p class="answer">If our message does not resonate with you, if you don’t feel that impulse, then…</p>
<p class="answer">“PLEASE, DON’T (F***ING) COME.”</p>
<p class="answer">“The door opens onto the void – there is already nothing left that once gave you balance.<br>Look behind you: it’s everything that keeps being swallowed, because it tastes like the past.<br>So take your momentum – who knows, maybe you have the power of the leap that gives wings to existence.<br>Learn to see what will never be told to you. Learn to visualize.<br>Become the existence that makes you want to exist.<br>Forget fullness – take your emptiness and build your unity.”</p>

const openModal = (imgSrc, title, year) => {
            const backdrop = document.getElementById('modal-backdrop');
            const inner = document.getElementById('modal-inner');
            
            inner.innerHTML = `
                <div class="flex flex-col items-center">
                    <img src="${imgSrc}" class="max-w-full max-h-[80vh] object-contain shadow-2xl border border-gray-800">
                    <div class="mt-6 text-center">
                        <h2 class="text-3xl font-heading uppercase text-white tracking-tight">${title}</h2>
                        <p class="text-gray-500 text-sm mt-2 font-body">${year} • ARCHIVE ID #${Math.floor(Math.random() * 10000)}</p>
                    </div>
                </div>
            `;
            
            backdrop.classList.remove('hidden');
            
            void backdrop.offsetWidth;
            backdrop.classList.remove('opacity-0');
            document.body.style.overflow = 'hidden';

            document.addEventListener('keydown', handleEsc);
        };

        const openVideoModal = (youtubeId, title = '') => {
             const backdrop = document.getElementById('modal-backdrop');
            const inner = document.getElementById('modal-inner');

            inner.innerHTML = `
                <div class="w-full max-w-6xl mx-auto">
                    <div class="w-full aspect-video bg-black border border-gray-800 shadow-2xl relative overflow-hidden">
                        <iframe
                            class="w-full h-full"
                            src="https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0"
                            frameborder="0"
                            allow="autoplay; encrypted-media"
                            allowfullscreen>
                        </iframe>
                    </div>
                    ${title ? `
                    <div class="mt-6 text-center">
                        <h2 class="text-2xl md:text-3xl font-heading uppercase text-white tracking-tight">${title}</h2>
                    </div>` : ``}
                </div>
            `;

            backdrop.classList.remove('hidden');
            void backdrop.offsetWidth;
            backdrop.classList.remove('opacity-0');
            document.body.style.overflow = 'hidden';
            document.addEventListener('keydown', handleEsc);
        };

        const closeModal = () => {
            const backdrop = document.getElementById('modal-backdrop');
            backdrop.classList.add('opacity-0');
            setTimeout(() => {
                backdrop.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
            document.removeEventListener('keydown', handleEsc);
        };

        const handleEsc = (e) => {
            if (e.key === 'Escape') closeModal();
        };

        const initAutoplayVideos = (scope = document) => {
            const videos = scope.querySelectorAll('video[autoplay], video.js-autoplay-video');

            videos.forEach(video => {
                video.muted = true;
                video.defaultMuted = true;
                video.autoplay = true;
                video.loop = true;
                video.playsInline = true;
                video.setAttribute('muted', '');
                video.setAttribute('autoplay', '');
                video.setAttribute('loop', '');
                video.setAttribute('playsinline', '');
                video.setAttribute('webkit-playsinline', '');
                video.setAttribute('preload', 'auto');
                video.preload = 'auto';

                const tryPlay = () => {
                    const playPromise = video.play();
                    if (playPromise && typeof playPromise.catch === 'function') {
                        playPromise.catch(() => {
                            video.controls = true;
                        });
                    }
                };

                if (video.readyState >= 2) {
                    tryPlay();
                } else {
                    video.load();
                    video.addEventListener('loadedmetadata', tryPlay, { once: true });
                    video.addEventListener('canplay', tryPlay, { once: true });
                    video.addEventListener('canplaythrough', tryPlay, { once: true });
                }

                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) tryPlay();
                });

                const unlockOnce = () => {
                    tryPlay();
                    window.removeEventListener('touchstart', unlockOnce);
                    window.removeEventListener('click', unlockOnce);
                };

                window.addEventListener('touchstart', unlockOnce, { once: true, passive: true });
                window.addEventListener('click', unlockOnce, { once: true });
            });
        };

document.addEventListener('DOMContentLoaded', () => {
            router('home');
            requestAnimationFrame(() => initAutoplayVideos(document));
        });


    </script>


<script>
  (function() {
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyhMJOO-NImgie4LfcqiplsDMq7ibFKp1IuHlOt6q_7h21J63pN2bqgOKk9iTjBvg_GmQ/exec';

    const form = document.getElementById('newsletter-form');
    if (!form) return;

    const input = document.getElementById('newsletter-email');
    const statusEl = document.getElementById('newsletter-status');
    const btn = document.getElementById('newsletter-submit');

    function setStatus(text) {
      if (statusEl) statusEl.textContent = text || '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setStatus('');

      const email = (input?.value || '').trim();
      if (!email) {
        setStatus('please enter an email.');
        return;
      }

      if (btn) btn.disabled = true;

      try {
        const payload = {
          email,
          source: 'headbutt-site',
          page: window.location.pathname,
          ua: navigator.userAgent
        };

        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => null);

        if (data && data.ok) {
          setStatus('thanks. you’re on the list.');
          if (input) input.value = '';
        } else {
          setStatus('something went wrong. try again.');
          console.error('newsletter error:', data);
        }
      } catch (err) {
        setStatus('something went wrong. try again.');
        console.error(err);
      } finally {
        if (btn) btn.disabled = false;
      }
    });
  })();
</script>
